<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🤍</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&family=Cormorant+Garamond:wght@700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Poppins,sans-serif;

height:100vh;

overflow:hidden;

background:
radial-gradient(circle at top,#1d2951,#060814 70%);

display:flex;

justify-content:center;

align-items:center;

color:white;

}

/* Aurora */

body::before{

content:"";

position:fixed;

width:100%;

height:100%;

background:

radial-gradient(circle at 20% 30%,rgba(255,120,180,.18),transparent 40%),

radial-gradient(circle at 80% 20%,rgba(0,255,255,.15),transparent 45%);

filter:blur(60px);

animation:move 12s infinite alternate;

z-index:-2;

}

@keyframes move{

100%{

transform:translateY(-40px) scale(1.2);

}

}

/* Card */

.card{

width:90%;

max-width:380px;

padding:35px;

background:rgba(255,255,255,.08);

border:1px solid rgba(255,255,255,.15);

backdrop-filter:blur(18px);

border-radius:25px;

text-align:center;

}

/* Title */

h1{

font-family:'Cormorant Garamond',serif;

font-size:40px;

margin-bottom:10px;

}

p{

opacity:.8;

margin-bottom:30px;

}

/* Envelope */

#envelope{

font-size:95px;

cursor:pointer;

transition:.4s;

}

#envelope:hover{

transform:scale(1.08);

}

/* Letter */

#letter{

display:none;

position:fixed;

inset:0;

background:rgba(0,0,0,.65);

backdrop-filter:blur(8px);

justify-content:center;

align-items:center;

padding:20px;

}

.paper{

background:#fffdf8;

color:#333;

padding:25px;

border-radius:18px;

max-width:500px;

width:100%;

max-height:85vh;

overflow:auto;

}

.paper h2{

color:#d16d98;

margin-bottom:15px;

}

#text{

white-space:pre-wrap;

line-height:1.8;

}

button{

margin-top:20px;

padding:10px 20px;

border:none;

background:#d16d98;

color:white;

border-radius:10px;

}

</style>

</head>

<body>

<div class="card">

<h1>Happy Birthday 🤍</h1>

<p>Tap the envelope.</p>

<div id="envelope">💌</div>

</div>

<div id="letter">

<div class="paper">

<h2>Untuk Yuanita Wilyana Putri</h2>

<div id="text"></div>

<button onclick="document.getElementById('letter').style.display='none'">
Close
</button>

</div>

</div>

<audio id="music">

<source src="about-you.mp3" type="audio/mpeg">

</audio>
