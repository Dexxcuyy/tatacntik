<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Happy Birthday, Yuanita 🤍</title>

    <meta name="theme-color" content="#090B18">
    <meta name="description" content="A special birthday website made with love.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ===================================== -->
<!-- LOADING SCREEN -->
<!-- ===================================== -->

<div id="loading-screen">

    <div class="loading-content">

        <h1>Every second brings us closer...</h1>

        <p>17 June 2026</p>

    </div>

</div>

<!-- ===================================== -->
<!-- BACKGROUND -->
<!-- ===================================== -->

<div id="background">

    <div class="aurora aurora-1"></div>
    <div class="aurora aurora-2"></div>

    <div id="stars"></div>

    <div id="fireflies"></div>

    <div id="petals"></div>

    <div id="moon"></div>

</div>

<!-- ===================================== -->
<!-- MAIN -->
<!-- ===================================== -->

<main>

<section class="hero">

<div class="glass-card">

<h1 class="title">
For
<br>
<span>Yuanita Wilyana Putri</span>
</h1>

<p class="subtitle">

There is something waiting for you.

</p>

<!-- Countdown -->

<div id="countdown">

<div class="time-box">

<span id="days">00</span>

<small>Days</small>

</div>

<div class="time-box">

<span id="hours">00</span>

<small>Hours</small>

</div>

<div class="time-box">

<span id="minutes">00</span>

<small>Minutes</small>

</div>

<div class="time-box">

<span id="seconds">00</span>

<small>Seconds</small>

</div>

</div>

<!-- Envelope -->

<div id="envelope-area">

<div id="envelope" class="locked">

<div class="lock-icon">

🔒

</div>

💌

</div>

<p id="envelope-text">

The letter will unlock when the countdown ends.

</p>

</div>

</div>

</section>

</main>

<!-- ===================================== -->
<!-- LETTER MODAL -->
<!-- ===================================== -->

<div id="letter-modal">

<div class="letter-paper">

<button id="close-letter">

✕

</button>

<h2>

Happy Birthday 🤍

</h2>

<div id="typed-letter">

</div>

</div>

</div>

<!-- ===================================== -->
<!-- AUDIO -->
<!-- ===================================== -->

<audio
id="bgMusic"
preload="auto">

<source
src="about-you.mp3"
type="audio/mpeg">

</audio>

<!-- ===================================== -->
<!-- SCRIPT -->
<!-- ===================================== -->

<script src="script.js"></script>

</body>
</html>
