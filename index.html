<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday 🤍</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Cormorant+Garamond:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{

background:#070B18;
overflow:hidden;
font-family:'Poppins',sans-serif;
color:white;
height:100vh;

}

/* ============================= */
/* Aurora */
/* ============================= */

body::before{

content:"";

position:fixed;

width:100%;

height:100%;

background:

radial-gradient(circle at 20% 30%,rgba(255,120,180,.18),transparent 40%),

radial-gradient(circle at 80% 20%,rgba(0,255,255,.12),transparent 45%),

radial-gradient(circle at 50% 80%,rgba(120,120,255,.10),transparent 50%);

animation:aurora 12s linear infinite;

filter:blur(60px);

z-index:-5;

}

@keyframes aurora{

0%{

transform:translateX(-5%) translateY(-2%) scale(1);

}

50%{

transform:translateX(5%) translateY(3%) scale(1.15);

}

100%{

transform:translateX(-5%) translateY(-2%) scale(1);

}

}

/* ============================= */
/* Stars */
/* ============================= */

#stars{

position:fixed;

width:100%;

height:100%;

left:0;

top:0;

overflow:hidden;

z-index:-4;

}

.star{

position:absolute;

background:white;

border-radius:50%;

animation:twinkle 2s infinite ease-in-out;

}

@keyframes twinkle{

50%{

opacity:.2;

transform:scale(1.6);

}

}

/* ============================= */

main{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

}

/* ============================= */

.glass{

width:100%;

max-width:700px;

padding:45px;

background:rgba(255,255,255,.08);

border:1px solid rgba(255,255,255,.15);

backdrop-filter:blur(16px);

border-radius:28px;

text-align:center;

box-shadow:0 15px 50px rgba(0,0,0,.3);

}

/* ============================= */

.title{

font-family:'Cormorant Garamond',serif;

font-size:3rem;

font-weight:700;

margin-bottom:15px;

}

.title span{

color:#FFD8E8;

}

.subtitle{

opacity:.8;

margin-bottom:35px;

}

/* ============================= */

#countdown{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:15px;

margin-bottom:35px;

}

.box{

background:rgba(255,255,255,.08);

padding:18px;

border-radius:18px;

}

.box h2{

font-size:2rem;

}

.box span{

font-size:.8rem;

opacity:.7;

}

/* ============================= */

#envelope{

width:140px;

height:140px;

margin:auto;

border-radius:50%;

display:flex;

align-items:center;

justify-content:center;

font-size:70px;

cursor:pointer;

transition:.4s;

filter:drop-shadow(0 0 20px pink);

}

#envelope.locked{

opacity:.5;

}

#envelope.ready{

animation:pulse 2s infinite;

}

@keyframes pulse{

50%{

transform:scale(1.08);

}

}

.info{

margin-top:15px;

font-size:.9rem;

opacity:.7;

}

</style>

</head>

<body>

<div id="stars"></div>

<main>

<div class="glass">

<h1 class="title">

For

<br>

<span>Yuanita Wilyana Putri</span>

</h1>

<p class="subtitle">

Every second brings us closer...

</p>

<div id="countdown">

<div class="box">

<h2 id="days">00</h2>

<span>Days</span>

</div>

<div class="box">

<h2 id="hours">00</h2>

<span>Hours</span>

</div>

<div class="box">

<h2 id="minutes">00</h2>

<span>Minutes</span>

</div>

<div class="box">

<h2 id="seconds">00</h2>

<span>Seconds</span>

</div>

</div>

<div id="envelope" class="locked">

💌

</div>

<p class="info">

The letter will unlock when the countdown ends.

</p>
